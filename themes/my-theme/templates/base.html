<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ SITENAME }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ SITEURL }}/theme/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header class="site-header">
    <div class="header-inner">
        <a class="brand" href="{{ SITEURL }}/">
            <span class="brand-title">{{ SITENAME }}</span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mainNav" aria-label="Toggle navigation">Menu</button>
        <nav class="main-nav" id="mainNav">
            <a class="nav-home" href="{{ SITEURL }}/">Home</a>

            <div class="nav-section">
                <span class="nav-section-title">Sweden</span>
                <div class="nav-section-groups">
                    <div class="nav-group">
                        <span class="nav-group-title">25-26</span>
                        <div class="nav-group-links">
                            <a class="nav-group-link" href="{{ SITEURL }}/category/se-25-26-regular-season.html">Regular</a>
                            <span class="nav-link-disabled">Playoffs</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">Finland</span>
                <div class="nav-section-groups">
                    <div class="nav-group">
                        <span class="nav-group-title">25-26</span>
                        <div class="nav-group-links">
                            <a class="nav-group-link" href="{{ SITEURL }}/category/fi-25-26-regular-season.html">Regular</a>
                            <span class="nav-link-disabled">Playoffs</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">Czech Republic</span>
                <div class="nav-section-groups">
                    <div class="nav-group">
                        <span class="nav-group-title">25-26</span>
                        <div class="nav-group-links">
                            <a class="nav-group-link" href="{{ SITEURL }}/category/cz-25-26-regular-season.html">Regular</a>
                            <span class="nav-link-disabled">Playoffs</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">Switzerland</span>
                <div class="nav-section-groups">
                    <div class="nav-group">
                        <span class="nav-group-title">25-26</span>
                        <div class="nav-group-links">
                            <a class="nav-group-link" href="{{ SITEURL }}/category/ch-25-26-regular-season.html">Regular</a>
                            <a class="nav-group-link" href="{{ SITEURL }}/category/ch-25-26-playoffs.html">Playoffs</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-section">
                <span class="nav-section-title">Germany</span>
                <div class="nav-section-groups">
                    <div class="nav-group">
                        <span class="nav-group-title">25-26</span>
                        <div class="nav-group-links">
                            <a class="nav-group-link" href="{{ SITEURL }}/category/25-26-regular-season.html">Regular</a>
                            <span class="nav-link-disabled">Playoffs</span>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</header>

<main class="main-content">
    <div class="app-container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <a class="footer-link" href="{{ SITEURL }}/archive.html">Archive</a>
        <span class="footer-divider">·</span>
        <span>© 2026 Floorball Stats</span>
    </div>
</footer>
<script>
const menuToggle = document.querySelector('.menu-toggle');
const mainNav = document.querySelector('#mainNav');
if (menuToggle && mainNav) {
  menuToggle.addEventListener('click', () => {
    const expanded = menuToggle.getAttribute('aria-expanded') === 'true';
    menuToggle.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    mainNav.classList.toggle('is-open');
  });
}
</script>
</body>
</html>
